# offline mode
offline.activeer=Offline-Modus Activatiescherm
offline.confirm=Wilt u de Offline Modus inschakelen?
offline.uitleg=Alhambra maakt normaal gezien gebruik van de VICHogent Servers. Mocht er een probleem zijn met verbinding, dan zou dat een ramp zijn.\nMaar vrees niet! Door Offline-Modus aan te zetten kunt u blijven genieten van Alhambra, zelfs bij onvoorziene omstandigheden!\n\n\nEens de Offline-Modus aanstaan kan er niet meer gewisseld worden naar de VICHogent servers tot na de volgende herstart.
offline.download=De offline-modus maakt gebruik van de H2-module (JAR-bestand) om informatie in te laden. Het spel kan dus niet gespeeld worden in offline modus zonder dit bestand.\n\n\nH2 Database Engine Download: https://github.com/h2database/h2database/releases/
offline.jar=Geen H2 module driver jar gevonden
offline.error=Offline-Modus kan niet gestart worden!
offline.alAanTitle=Offline-Modus informatiescherm
offline.alHeader=Offline-Modus werd automatisch ingeschakeld!
offline.alAanUitleg=Offline-Modus werd automatisch ingeschakeld, omdat er geen verbinding met VICHogent gemaakt kon worden.\n\nAlhambra maakt normaal gezien gebruik van de VICHogent Servers. Mocht er een probleem zijn met verbinding, dan zou dat een ramp zijn.\nMaar vrees niet! Omdat Offline-Modus aanstaat kunt u blijven genieten van Alhambra, zelfs bij onvoorziene omstandigheden!


